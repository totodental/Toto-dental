services:
  - type: web
    name: toto-dental
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: RENDER_DISK_PATH
        value: /var/data
      - key: FRONTEND_ORIGINS
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: ADMIN_ROUTE_ID
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
    disk:
      name: toto-dental-data
      mountPath: /var/data
      sizeGB: 1
